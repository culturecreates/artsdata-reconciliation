name: Run Unit Tests

on:
  workflow_call:

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run GraphDB
        run: docker compose -f "test/graph-db/docker-compose.yml" up -d --build

      - name: Wait for GraphDB to be ready
        run: |
          until curl -s http://127.0.0.1:7200/rest/repositories > /dev/null; do
            echo "Waiting for GraphDB to start..."
            sleep 5
          done

      - name: Import repository configuration
        run: |
          curl 'http://127.0.0.1:7200/rest/repositories' \
          --header 'Content-Type: multipart/form-data' \
          --form 'config=@"./test/graph-db/data/config.ttl"'

      - name: Ensure .env.test exists
        run: |
          touch .env.test
          echo 'ARTSDATA_ENDPOINT="http://127.0.0.1:7200/"' >> .env.test
          echo 'REPOSITORY="recon-test"' >> .env.test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test
