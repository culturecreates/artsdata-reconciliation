name: CI CD - Staging Server

on:
  workflow_call:
    inputs:
      deploy_sha:
        required: false
        type: string

      heroku_app_name:
        required: false
        type: string

      heroku_email:
        required: false
        type: string

    secrets:
      HEROKU_API_KEY:
        required: true

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'src/**'

jobs:
  test:
    uses: ./.github/workflows/run-unit-tests.yml

  deploy-to-heroku:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout requested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_sha || github.sha }}

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.14.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ inputs.heroku_app_name || vars.HEROKU_APP_NAME }}
          heroku_email: ${{ inputs.heroku_email || vars.HEROKU_EMAIL }}